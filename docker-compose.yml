version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: passengers
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/passengers
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
