<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else "Passengers" }}</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="mx-auto w-full max-w-[1400px] px-2 sm:px-4 lg:px-6 py-3">
    {% block content %}{% endblock %}
  </div>

  <script src="/static/app.js?v=6"></script>
</body>

<div class="fixed right-4 top-4 z-[9999]">
  <form method="post" action="/set-language" class="flex items-center gap-2 rounded-2xl border border-slate-200 bg-white/95 px-2 py-2 shadow-sm backdrop-blur">
    <input
      type="hidden"
      name="next"
      value="{{ request.url.path }}{% if request.url.query %}?{{ request.url.query }}{% endif %}"
    />

    <button
      type="submit"
      name="lang"
      value="uk"
      class="inline-flex items-center rounded-xl px-3 py-1.5 text-xs font-semibold border {% if get_lang(request) == 'uk' %}bg-slate-900 text-white border-slate-900{% else %}bg-white text-slate-700 border-slate-300 hover:bg-slate-50{% endif %}">
      {{ t(request, "lang.uk", "UA") }}
    </button>

    <button
      type="submit"
      name="lang"
      value="en"
      class="inline-flex items-center rounded-xl px-3 py-1.5 text-xs font-semibold border {% if get_lang(request) == 'en' %}bg-slate-900 text-white border-slate-900{% else %}bg-white text-slate-700 border-slate-300 hover:bg-slate-50{% endif %}">
      {{ t(request, "lang.en", "EN") }}
    </button>
  </form>
</div>


</html>
