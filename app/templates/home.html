{% extends "base.html" %}
{% block content %}

<div class="max-w-6xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-bold tracking-tight">Admin</h1>
    <p class="text-slate-500 mt-2">Choose a module</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="border-b border-slate-200 px-6 py-4">
        <h2 class="text-xl font-semibold">Bookings</h2>
      </div>
      <div class="p-6 space-y-4">
        <p class="text-sm text-slate-600">
          Manage imported bookings, payment proofs, matching and sync.
        </p>

        <div class="flex flex-wrap gap-3">
          <a href="/admin/dashboard"
             class="inline-flex items-center rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">
            Open dashboard
          </a>

          <a href="/admin/bookings"
             class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
            Open bookings list
          </a>

          <a href="/admin/bookings/test-import"
             class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
            Test import
          </a>
        </div>
      </div>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="border-b border-slate-200 px-6 py-4">
        <h2 class="text-xl font-semibold">Trips</h2>
      </div>
      <div class="p-6 space-y-4">
        <p class="text-sm text-slate-600">
          Manage trips, passengers and release flow.
        </p>

        <div class="flex flex-wrap gap-3">
          <a href="/admin/trips"
             class="inline-flex items-center rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">
            Open trips
          </a>

          <a href="/admin/resumee"
             class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
            Open resumee
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-8">
    <form method="post" action="/admin/logout">
      <button type="submit"
              class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
        Logout
      </button>
    </form>
  </div>
</div>

{% endblock %}
