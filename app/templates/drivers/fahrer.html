{% extends "drivers/base_driver.html" %}
{% set active_page = 'fahrer' %}
{% block title %}Fahrer · Меню{% endblock %}

{% block content %}

<h1 class="text-xl font-semibold mb-4">Fahrer</h1>

<div class="grid grid-cols-1 gap-4">

  <!-- Дневници -->
  <a href="{{ url_for('driver_portal.logs_list') }}"
     class="block bg-white border rounded-xl shadow p-4 hover:bg-slate-50">
    <div class="text-lg font-semibold mb-1">Дневници</div>
    <div class="text-sm text-slate-500">Попълнени отчети по дни</div>
  </a>

  <!-- Отчети -->
  <a href="{{ url_for('driver_portal.reports') }}"
     class="block bg-white border rounded-xl shadow p-4 hover:bg-slate-50">
    <div class="text-lg font-semibold mb-1">Отчети</div>
    <div class="text-sm text-slate-500">Обобщения и експорт</div>
  </a>

  <!-- Профил -->
  <a href="{{ url_for('driver_portal.profile') }}"
     class="block bg-white border rounded-xl shadow p-4 hover:bg-slate-50">
    <div class="text-lg font-semibold mb-1">Профил</div>
    <div class="text-sm text-slate-500">Информация, настройки, промяна на ПИН</div>
  </a>

</div>

{% endblock %}
