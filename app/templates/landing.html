{% extends "base.html" %}
{% block content %}

<div style="max-width:980px;margin:24px auto;">
  <div style="margin-bottom:18px;">
    <div style="font-size:28px;font-weight:900;line-height:1;color:#0f172a;">Вход</div>
    <div style="margin-top:8px;color:#64748b;font-size:14px;">Избери секция и въведи парола</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <!-- ADMIN -> /admin -->
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px;">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;">
        <div style="width:48px;height:48px;border-radius:16px;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:24px;">🛠️</div>
        <div>
          <div style="font-size:20px;font-weight:900;color:#0f172a;line-height:1.1;">Админ</div>
          <div style="margin-top:4px;color:#64748b;font-size:13px;">Управление</div>
        </div>
      </div>

      <form method="post" action="/admin/login" style="display:flex;flex-direction:column;gap:10px;">
        <input type="hidden" name="next" value="/admin" />
        <label style="font-size:13px;font-weight:800;color:#334155;">Парола</label>
        <input type="password" name="password" required
               placeholder="ADMIN_PASSWORD"
               style="border:1px solid #cbd5e1;border-radius:14px;padding:12px 14px;font-size:15px;" />
        <button type="submit"
                style="border:1px solid #0f172a;background:#0f172a;color:#fff;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:900;cursor:pointer;">
          Влез
        </button>
      </form>
    </div>

    <!-- DRIVERS -> /drivers -->
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px;">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;">
        <div style="width:48px;height:48px;border-radius:16px;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:24px;">🚌</div>
        <div>
          <div style="font-size:20px;font-weight:900;color:#0f172a;line-height:1.1;">Шофьори</div>
          <div style="margin-top:4px;color:#64748b;font-size:13px;">Freigabe рейсове</div>
        </div>
      </div>

      <form method="post" action="/drivers/login" style="display:flex;flex-direction:column;gap:10px;">
        <label style="font-size:13px;font-weight:800;color:#334155;">Парола</label>
        <input type="password" name="password" required
               placeholder="DRIVER_PASSWORD"
               style="border:1px solid #cbd5e1;border-radius:14px;padding:12px 14px;font-size:15px;" />
        <button type="submit"
                style="border:1px solid #0f172a;background:#0f172a;color:#fff;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:900;cursor:pointer;">
          Влез
        </button>
      </form>
    </div>
  </div>

  <style>
    @media (max-width: 820px){
      div[style*="grid-template-columns:1fr 1fr"]{ grid-template-columns: 1fr !important; }
    }
  </style>
</div>

{% endblock %}
