{% extends "base.html" %}
{% block content %}

<div class="mx-auto max-w-6xl pb-10">
  <div class="mb-5 flex items-start gap-3">
    <div>
      <h1 class="text-xl font-black tracking-tight text-slate-900">
        Рейсове за шофьора
      </h1>

      <p class="mt-1 text-sm leading-6 text-slate-500">
        Показват се активните рейсове за вчера, днес и утре.
        Информацията се зарежда директно от системата и не изисква допълнително потвърждение от администратора.
      </p>
    </div>

    <form method="post" action="/drivers/logout" class="ml-auto shrink-0">
      <button
        type="submit"
        class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700 shadow-sm hover:bg-slate-50">
        Logout
      </button>
    </form>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
      Избери дата
    </div>

    <div
      id="dateTabs"
      class="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-3">
    </div>
  </div>

  <div class="mt-5">
    <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
      <div>
        <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
          Активни рейсове
        </div>

        <div
          id="selectedDateTitle"
          class="mt-1 text-lg font-black text-slate-900">
          —
        </div>
      </div>

      <div
        id="tripCountBadge"
        class="rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-600">
        0 рейса
      </div>
    </div>

    <div
      id="directionGrid"
      class="grid grid-cols-1 gap-4 lg:grid-cols-2">
    </div>

    <div
      id="otherTripsWrap"
      class="mt-4 hidden">
    </div>
  </div>

  <div
    id="tripDetailsWrap"
    class="mt-5 hidden">
  </div>
</div>

<style>
  .driver-date-button {
    width: 100%;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    background: #ffffff;
    padding: 14px;
    text-align: left;
    cursor: pointer;
    transition: 0.15s ease;
  }

  .driver-date-button:hover {
    background: #f8fafc;
  }

  .driver-date-button.active {
    border-color: #0f172a;
    background: #f8fafc;
    box-shadow: 0 0 0 2px #0f172a;
  }

  .direction-box {
    min-height: 190px;
    border: 1px solid #e2e8f0;
    border-radius: 18px;
    background: #ffffff;
    padding: 16px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
  }

  .direction-box.ua-at {
    border-top: 4px solid #2563eb;
  }

  .direction-box.at-ua {
    border-top: 4px solid #dc2626;
  }

  .direction-box.other {
    border-top: 4px solid #64748b;
  }

  .trip-choice {
    width: 100%;
    display: block;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    background: #ffffff;
    padding: 12px;
    text-align: left;
    cursor: pointer;
    transition: 0.15s ease;
  }

  .trip-choice:hover {
    border-color: #94a3b8;
    background: #f8fafc;
  }

  .trip-choice.active {
    border-color: #0f172a;
    background: #f8fafc;
    box-shadow: 0 0 0 2px #0f172a;
  }

  .details-card {
    border: 1px solid #cbd5e1;
    border-radius: 18px;
    background: #ffffff;
    padding: 18px;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
  }

  .details-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  @media (min-width: 768px) {
    .details-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  .details-item {
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    background: #f8fafc;
    padding: 12px;
  }
</style>

<script>
(function () {
  const ACTIVE_DAYS_RAW = {{ (active_days | default([], true)) | tojson }};
  const TRIPS_RAW = {{ (trips_data | default([], true)) | tojson }};
  const TODAY_FROM_BACKEND = {{ (today | default("")) | tojson }};

  function esc(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function normalizeText(value) {
    return String(value ?? "")
      .trim()
      .toLowerCase()
      .replaceAll("і", "i")
      .replaceAll("ї", "i")
      .replaceAll("ё", "е")
      .replace(/\s+/g, " ");
  }

  function numberOrZero(value) {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : 0;
  }

  function ymd(dateObject) {
    const year = dateObject.getFullYear();
    const month = String(dateObject.getMonth() + 1).padStart(2, "0");
    const day = String(dateObject.getDate()).padStart(2, "0");

    return `${year}-${month}-${day}`;
  }

  function parseLocalDate(dateString) {
    const parts = String(dateString || "")
      .split("-")
      .map((item) => Number(item));

    if (parts.length !== 3 || parts.some((item) => !Number.isFinite(item))) {
      return new Date();
    }

    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function addDays(dateString, amount) {
    const dateObject = parseLocalDate(dateString);
    dateObject.setDate(dateObject.getDate() + Number(amount || 0));

    return ymd(dateObject);
  }

  function formatDateBg(dateString) {
    if (!dateString) return "—";

    const dateObject = parseLocalDate(dateString);

    return dateObject.toLocaleDateString("bg-BG", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });
  }

  function relativeDayLabel(dateString, todayString) {
    if (dateString === addDays(todayString, -1)) return "Вчера";
    if (dateString === todayString) return "Днес";
    if (dateString === addDays(todayString, 1)) return "Утре";

    return "Дата";
  }

  const TODAY = String(TODAY_FROM_BACKEND || ymd(new Date()));

  /*
    Ако backend-ът още не подава active_days,
    страницата сама изгражда вчера / днес / утре.
  */
  const ACTIVE_DAYS = (
    Array.isArray(ACTIVE_DAYS_RAW) && ACTIVE_DAYS_RAW.length
      ? ACTIVE_DAYS_RAW
      : [-1, 0, 1].map((offset) => {
          const date = addDays(TODAY, offset);

          return {
            date: date,
            relative_label: relativeDayLabel(date, TODAY),
            date_label: formatDateBg(date)
          };
        })
  ).map((item) => {
    const date = String(item.date || "").trim();

    return {
      date: date,
      relative_label:
        String(
          item.relative_label ||
          item.relativeLabel ||
          relativeDayLabel(date, TODAY)
        ),
      date_label:
        String(
          item.date_label ||
          item.dateLabel ||
          formatDateBg(date)
        )
    };
  });

  function firstAvailableValue(object, keys, fallback = "") {
    for (const key of keys) {
      const value = object?.[key];

      if (value !== undefined && value !== null && String(value).trim() !== "") {
        return value;
      }
    }

    return fallback;
  }

  function isUkraineStop(value) {
    const text = normalizeText(value);

    return [
      "kyiv",
      "kiev",
      "київ",
      "киев",
      "zhytomyr",
      "житомир",
      "rivne",
      "рівне",
      "ровно",
      "lviv",
      "львів",
      "львов",
      "ukraine",
      "україна",
      "украина"
    ].some((token) => text.includes(normalizeText(token)));
  }

  function isAustriaStop(value) {
    const text = normalizeText(value);

    return [
      "wien",
      "vienna",
      "відень",
      "видень",
      "innsbruck",
      "інсбрук",
      "инсбрук",
      "linz",
      "лінц",
      "wels",
      "вельс",
      "salzburg",
      "зальцбург",
      "graz",
      "грац",
      "klagenfurt",
      "клагенфурт",
      "villach",
      "філлах",
      "филлах",
      "austria",
      "австрія",
      "австрия"
    ].some((token) => text.includes(normalizeText(token)));
  }

  function normalizeDirection(rawTrip) {
    const rawDirection = normalizeText(
      firstAvailableValue(
        rawTrip,
        ["dir", "direction", "direction_code", "directionCode"],
        ""
      )
    )
      .replaceAll(" ", "")
      .replaceAll("-", "_")
      .replaceAll(">", "")
      .replaceAll("→", "_");

    /*
      Поддържаме и новите, и старите кодове:

      KI    = Kyiv → Innsbruck = UA → AT
      IK    = Innsbruck → Kyiv = AT → UA
    */
    if (
      rawDirection === "ua_at" ||
      rawDirection === "uaat" ||
      rawDirection === "ki"
    ) {
      return "UA_AT";
    }

    if (
      rawDirection === "at_ua" ||
      rawDirection === "atua" ||
      rawDirection === "ik"
    ) {
      return "AT_UA";
    }

    const fromValue = firstAvailableValue(
      rawTrip,
      ["from", "routeFrom", "route_from", "busFrom", "bus_from"],
      ""
    );

    const toValue = firstAvailableValue(
      rawTrip,
      ["to", "routeTo", "route_to", "busTo", "bus_to"],
      ""
    );

    if (isUkraineStop(fromValue) && isAustriaStop(toValue)) {
      return "UA_AT";
    }

    if (isAustriaStop(fromValue) && isUkraineStop(toValue)) {
      return "AT_UA";
    }

    return "OTHER";
  }

  function normalizeTrip(rawTrip) {
    const fromValue = String(
      firstAvailableValue(
        rawTrip,
        ["from", "routeFrom", "route_from", "busFrom", "bus_from"],
        "—"
      )
    );

    const toValue = String(
      firstAvailableValue(
        rawTrip,
        ["to", "routeTo", "route_to", "busTo", "bus_to"],
        "—"
      )
    );

    const dateValue = String(
      firstAvailableValue(
        rawTrip,
        ["date", "tripDate", "trip_date"],
        ""
      )
    );

    const labelValue = String(
      firstAvailableValue(
        rawTrip,
        ["routeLabel", "route_label", "label"],
        `${fromValue} → ${toValue}`
      )
    );

    return {
      id: numberOrZero(
        firstAvailableValue(rawTrip, ["id", "tripId", "trip_id"], 0)
      ),

      date: dateValue,

      dateLabel: String(
        firstAvailableValue(
          rawTrip,
          ["dateLabel", "date_label"],
          formatDateBg(dateValue)
        )
      ),

      time: String(
        firstAvailableValue(
          rawTrip,
          ["time", "tripTime", "trip_time"],
          "—"
        )
      ),

      from: fromValue,
      to: toValue,
      routeLabel: labelValue,
      dir: normalizeDirection(rawTrip),

      total: numberOrZero(
        firstAvailableValue(
          rawTrip,
          ["total", "displayTotal", "display_total"],
          0
        )
      ),

      kept: numberOrZero(
        firstAvailableValue(
          rawTrip,
          ["kept", "keptPassengerCount", "kept_passenger_count"],
          0
        )
      ),

      missing: numberOrZero(
        firstAvailableValue(
          rawTrip,
          ["missing", "missingPassengerCount", "missing_passenger_count"],
          0
        )
      )
    };
  }

  const TRIPS = (
    Array.isArray(TRIPS_RAW)
      ? TRIPS_RAW
      : []
  )
    .map(normalizeTrip)
    .filter((trip) => trip.id > 0 && trip.date);

  let selectedDate = TODAY;
  let selectedTripId = null;

  function tripsForDate(dateValue) {
    return TRIPS.filter((trip) => trip.date === dateValue);
  }

  function tripsForSelectedDate() {
    return tripsForDate(selectedDate);
  }

  function findSelectedTrip() {
    return TRIPS.find((trip) => {
      return (
        trip.date === selectedDate &&
        Number(trip.id) === Number(selectedTripId)
      );
    }) || null;
  }

  function chooseInitialDate() {
    const todayExists = ACTIVE_DAYS.some((day) => day.date === TODAY);

    if (todayExists) {
      selectedDate = TODAY;
      return;
    }

    const firstDateWithTrip = ACTIVE_DAYS.find((day) => {
      return tripsForDate(day.date).length > 0;
    });

    selectedDate = firstDateWithTrip?.date || ACTIVE_DAYS[0]?.date || TODAY;
  }

  function ensureValidSelectedTrip() {
    const selectedTrip = findSelectedTrip();

    if (selectedTrip) return;

    const availableTrips = tripsForSelectedDate();

    /*
      Ако за датата има само един рейс,
      подробностите му се отварят автоматично.
    */
    if (availableTrips.length === 1) {
      selectedTripId = Number(availableTrips[0].id);
      return;
    }

    selectedTripId = null;
  }

  function renderDateTabs() {
    const wrap = document.getElementById("dateTabs");

    if (!wrap) return;

    wrap.innerHTML = ACTIVE_DAYS.map((day) => {
      const count = tripsForDate(day.date).length;
      const activeClass = day.date === selectedDate ? " active" : "";

      return `
        <button
          type="button"
          class="driver-date-button${activeClass}"
          data-date="${esc(day.date)}">

          <div class="flex items-center justify-between gap-2">
            <div>
              <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
                ${esc(day.relative_label)}
              </div>

              <div class="mt-1 text-base font-black text-slate-900">
                ${esc(day.date_label)}
              </div>
            </div>

            <div class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-black text-slate-700">
              ${count}
            </div>
          </div>
        </button>
      `;
    }).join("");
  }

  function tripChoiceHtml(trip) {
    const isActive = Number(trip.id) === Number(selectedTripId);
    const activeClass = isActive ? " active" : "";

    const missingBlock = Number(trip.missing || 0) > 0
      ? `
        <div class="rounded-full border border-rose-200 bg-rose-50 px-2.5 py-1 text-xs font-black text-rose-700">
          Липсват: ${Number(trip.missing || 0)}
        </div>
      `
      : `
        <div class="rounded-full border border-emerald-200 bg-emerald-50 px-2.5 py-1 text-xs font-black text-emerald-700">
          Данните са налични
        </div>
      `;

    return `
      <button
        type="button"
        class="trip-choice${activeClass}"
        data-trip-id="${Number(trip.id)}">

        <div class="flex flex-wrap items-start justify-between gap-2">
          <div>
            <div class="text-sm font-black text-slate-900">
              ${esc(trip.routeLabel || "—")}
            </div>

            <div class="mt-1 text-xs text-slate-500">
              Курс #${Number(trip.id)}
            </div>
          </div>

          <div class="rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-xs font-black text-slate-700">
            ${esc(trip.time || "—")}
          </div>
        </div>

        <div class="mt-3 flex flex-wrap gap-2">
          <div class="rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-bold text-slate-600">
            Пътници: ${Number(trip.total || 0)}
          </div>

          ${missingBlock}
        </div>
      </button>
    `;
  }

  function renderDirectionBox(directionKey, title, cssClass) {
    const items = tripsForSelectedDate()
      .filter((trip) => trip.dir === directionKey)
      .sort((a, b) => {
        return String(a.time || "").localeCompare(String(b.time || ""));
      });

    const body = items.length
      ? `
        <div class="mt-4 space-y-3">
          ${items.map(tripChoiceHtml).join("")}
        </div>
      `
      : `
        <div class="mt-5 rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center text-sm text-slate-500">
          Няма рейс за избраната дата.
        </div>
      `;

    return `
      <div class="direction-box ${cssClass}">
        <div class="flex items-center justify-between gap-3">
          <div>
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Направление
            </div>

            <div class="mt-1 text-lg font-black text-slate-900">
              ${esc(title)}
            </div>
          </div>

          <div class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-black text-slate-700">
            ${items.length}
          </div>
        </div>

        ${body}
      </div>
    `;
  }

  function renderDirectionGrid() {
    const wrap = document.getElementById("directionGrid");

    if (!wrap) return;

    wrap.innerHTML = [
      renderDirectionBox(
        "UA_AT",
        "Украйна → Австрия",
        "ua-at"
      ),

      renderDirectionBox(
        "AT_UA",
        "Австрия → Украйна",
        "at-ua"
      )
    ].join("");
  }

  function renderOtherTrips() {
    const wrap = document.getElementById("otherTripsWrap");

    if (!wrap) return;

    const items = tripsForSelectedDate()
      .filter((trip) => trip.dir === "OTHER")
      .sort((a, b) => {
        return String(a.time || "").localeCompare(String(b.time || ""));
      });

    if (!items.length) {
      wrap.innerHTML = "";
      wrap.classList.add("hidden");
      return;
    }

    wrap.classList.remove("hidden");

    wrap.innerHTML = `
      <div class="direction-box other">
        <div class="flex items-center justify-between gap-3">
          <div>
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Допълнителни маршрути
            </div>

            <div class="mt-1 text-lg font-black text-slate-900">
              Други рейсове
            </div>
          </div>

          <div class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-black text-slate-700">
            ${items.length}
          </div>
        </div>

        <div class="mt-4 space-y-3">
          ${items.map(tripChoiceHtml).join("")}
        </div>
      </div>
    `;
  }

  function renderTripDetails() {
    const wrap = document.getElementById("tripDetailsWrap");

    if (!wrap) return;

    const trip = findSelectedTrip();

    if (!trip) {
      wrap.innerHTML = "";
      wrap.classList.add("hidden");
      return;
    }

    wrap.classList.remove("hidden");

    const missingValue = Number(trip.missing || 0);

    wrap.innerHTML = `
      <div class="details-card">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Избран рейс
            </div>

            <div class="mt-1 text-xl font-black text-slate-900">
              ${esc(trip.routeLabel || "—")}
            </div>

            <div class="mt-1 text-sm text-slate-500">
              Курс #${Number(trip.id)}
            </div>
          </div>

          <div class="flex flex-wrap gap-2">
            <a
              href="/drivers/scan?trip_id=${Number(trip.id)}"
              class="inline-flex min-h-[50px] items-center justify-center rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-black text-white hover:bg-blue-700">
              Сканирай QR
            </a>

            <a
              href="/drivers/trips/${Number(trip.id)}"
              class="inline-flex min-h-[50px] items-center justify-center rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-black text-white hover:bg-slate-800">
              Отвори списъка →
            </a>
          </div>
        </div>

        <div class="details-grid mt-5">
          <div class="details-item">
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Дата
            </div>

            <div class="mt-1 text-base font-black text-slate-900">
              ${esc(trip.dateLabel || formatDateBg(trip.date))}
            </div>
          </div>

          <div class="details-item">
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Час
            </div>

            <div class="mt-1 text-base font-black text-slate-900">
              ${esc(trip.time || "—")}
            </div>
          </div>

          <div class="details-item">
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Общо пътници
            </div>

            <div class="mt-1 text-base font-black text-slate-900">
              ${Number(trip.total || 0)}
            </div>
          </div>

          <div class="details-item">
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Налични редове
            </div>

            <div class="mt-1 text-base font-black text-slate-900">
              ${Number(trip.kept || 0)}
            </div>
          </div>

          <div class="details-item">
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Липсващи пътници
            </div>

            <div class="mt-1 text-base font-black ${missingValue > 0 ? "text-rose-700" : "text-emerald-700"}">
              ${missingValue}
            </div>
          </div>

          <div class="details-item">
            <div class="text-xs font-bold uppercase tracking-wide text-slate-500">
              Режим
            </div>

            <div class="mt-1 text-base font-black text-emerald-700">
              Live данни
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderDateTitle() {
    const title = document.getElementById("selectedDateTitle");
    const badge = document.getElementById("tripCountBadge");

    const day = ACTIVE_DAYS.find((item) => {
      return item.date === selectedDate;
    });

    const count = tripsForSelectedDate().length;

    if (title) {
      title.textContent = day
        ? `${day.relative_label} • ${day.date_label}`
        : formatDateBg(selectedDate);
    }

    if (badge) {
      badge.textContent = count === 1
        ? "1 рейс"
        : `${count} рейса`;
    }
  }

  function renderAll() {
    ensureValidSelectedTrip();

    renderDateTabs();
    renderDateTitle();
    renderDirectionGrid();
    renderOtherTrips();
    renderTripDetails();
  }

  document
    .getElementById("dateTabs")
    ?.addEventListener("click", (event) => {
      const button = event.target.closest("[data-date]");

      if (!button) return;

      selectedDate = String(button.dataset.date || TODAY);
      selectedTripId = null;

      renderAll();
    });

  document
    .getElementById("directionGrid")
    ?.addEventListener("click", (event) => {
      const button = event.target.closest("[data-trip-id]");

      if (!button) return;

      selectedTripId = Number(button.dataset.tripId);

      renderAll();
    });

  document
    .getElementById("otherTripsWrap")
