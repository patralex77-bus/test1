{% extends "base.html" %}
{% block content %}

<div class="topbar" style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;">
  <div class="title">
    <div style="font-weight:900;font-size:16px;line-height:1;">Шофьори</div>
    <div style="color:#666;margin-top:4px;">Само рейсове с Freigabe (окончателни)</div>
  </div>

  <form method="post" action="/drivers/logout" style="margin-left:auto;">
    <button class="btn" type="submit">Logout</button>
  </form>
</div>

<div class="mt-4 grid grid-cols-1 gap-4 lg:grid-cols-2">
  <div class="rounded-2xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
    <div class="flex items-center justify-between">
      <button id="calPrev" class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold active:scale-[0.99]">←</button>
      <div class="text-sm font-semibold text-slate-800" id="calTitle">—</div>
      <button id="calNext" class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold active:scale-[0.99]">→</button>
    </div>

    <div class="mt-3 grid grid-cols-7 gap-2 text-xs font-semibold text-slate-500">
      <div class="text-center">Пн</div>
      <div class="text-center">Вт</div>
      <div class="text-center">Ср</div>
      <div class="text-center">Чт</div>
      <div class="text-center">Пт</div>
      <div class="text-center">Сб</div>
      <div class="text-center">Нд</div>
    </div>

    <div class="mt-2 grid grid-cols-7 gap-2" id="calGrid"></div>

    <div class="mt-3 text-xs text-slate-500">
      • Дните с рейс имат малка точка. • Избраният ден е маркиран.
    </div>
  </div>

  <div class="rounded-2xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
    <div class="flex items-center justify-between">
      <div class="text-sm font-semibold text-slate-800">Рейсове за деня</div>
      <div class="text-xs text-slate-500" id="dayHint">—</div>
    </div>

    <div class="mt-3 space-y-3" id="dayTripsWrap"></div>

    <div class="mt-3 text-xs text-slate-500">
      Избери ден от календара, за да видиш наличните рейсове и да отвориш списъка.
    </div>
  </div>
</div>

<style>
  .cal-day{
    height:46px;
    border:1px solid #e2e8f0;
    border-radius:14px;
    background:#fff;
    padding:6px 8px;
    font-size:13px;
    color:#0f172a;
    user-select:none;
    position:relative;
    cursor:pointer;
  }

  .cal-day.muted{
    color:#94a3b8;
    background:#fafafa;
  }

  .cal-day.selected{
    outline:2px solid #0f172a;
    outline-offset:1px;
    background:#eef2ff;
    border-color:#c7d2fe;
  }

  .cal-day .daynum{
    position:absolute;
    top:6px;
    right:8px;
    font-weight:400;
    line-height:1;
  }

  .cal-day .dot{
    position:absolute;
    bottom:8px;
    left:8px;
    width:8px;
    height:8px;
    border-radius:999px;
    background:#0f172a;
    opacity:.75;
  }

  .tripCard{
    border:1px solid #e2e8f0;
    border-radius:16px;
    padding:12px;
    background:#fff;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid #e2e8f0;
    background:#f8fafc;
    font-size:12px;
    font-weight:800;
    color:#0f172a;
  }

  .tripMeta{
    margin-top:8px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    font-size:12px;
    color:#64748b;
  }

  .openBtn{
    margin-top:10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:10px 12px;
    font-weight:900;
    background:#fff;
    cursor:pointer;
    text-decoration:none;
    color:#0f172a;
  }

  .openBtn:active{
    transform:scale(0.99);
  }
</style>

<script>
  const TRIPS = {{ (trips_data | default([], true)) | tojson }};

  const tripDateSet = new Set();
  for (const t of TRIPS){
    if (t.date) tripDateSet.add(t.date);
  }

  function ymd(dt){
    const y = dt.getFullYear();
    const m = String(dt.getMonth() + 1).padStart(2, "0");
    const d = String(dt.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function startOfCalendarMonth(year, monthIndex){
    const first = new Date(year, monthIndex, 1);
    const dow = (first.getDay() + 6) % 7;
    const start = new Date(year, monthIndex, 1 - dow);
    start.setHours(0, 0, 0, 0);
    return start;
  }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderCalendar(viewDate){
    const grid = document.getElementById("calGrid");
    const title = document.getElementById("calTitle");
    if (!grid || !title) return;

    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const monthName = viewDate.toLocaleString("bg-BG", { month: "long", year: "numeric" });
    title.textContent = monthName.charAt(0).toUpperCase() + monthName.slice(1);

    grid.innerHTML = "";

    const start = startOfCalendarMonth(year, month);
    const selected = window.__SELECTED_DATE__ || "";

    for (let i = 0; i < 42; i++){
      const day = new Date(start);
      day.setDate(start.getDate() + i);

      const inMonth = day.getMonth() === month;
      const key = ymd(day);
      const hasTrip = tripDateSet.has(key);

      const cell = document.createElement("button");
      cell.type = "button";
      cell.className = "cal-day" + (inMonth ? "" : " muted") + (selected === key ? " selected" : "");
      cell.innerHTML = `<div class="daynum">${day.getDate()}</div>${hasTrip ? `<div class="dot"></div>` : ``}`;

      cell.addEventListener("click", () => {
        window.__SELECTED_DATE__ = key;
        renderCalendar(viewDate);
        renderTripsForDay(key);
      });

      grid.appendChild(cell);
    }
  }

  function sortTripsForDay(list){
    const rank = (dir) => dir === "IK" ? 0 : (dir === "KI" ? 1 : 2);
    return list
      .slice()
      .sort((a, b) => rank(a.dir) - rank(b.dir) || String(a.time || "").localeCompare(String(b.time || "")));
  }

  function renderTripsForDay(dateStr){
    const wrap = document.getElementById("dayTripsWrap");
    const hint = document.getElementById("dayHint");
    if (!wrap) return;

    if (hint) hint.textContent = dateStr || "—";

    if (!dateStr){
      wrap.innerHTML = `<div class="text-sm text-slate-500">Избери дата от календара.</div>`;
      return;
    }

    const tripsForDay = sortTripsForDay(TRIPS.filter(t => t.date === dateStr));

    if (tripsForDay.length === 0){
      wrap.innerHTML = `<div class="text-sm text-slate-500">Няма рейсове за избраната дата.</div>`;
      return;
    }

    wrap.innerHTML = "";

    for (const t of tripsForDay){
      const label = t.label || `${t.from || "?"} → ${t.to || "?"}`;

      wrap.insertAdjacentHTML("beforeend", `
        <div class="tripCard">
          <div class="flex items-center justify-between gap-2 flex-wrap">
            <div class="badge">${esc(label)}</div>
            <div style="font-size:12px;color:#64748b;font-weight:800;">Курс #${t.id}</div>
          </div>

          <div class="tripMeta">
            <div>Час: <span style="font-weight:900;color:#0f172a">${esc(t.time || "—")}</span></div>
            <div>Пътници: <span style="font-weight:900;color:#0f172a">${Number(t.total || 0)}</span></div>
            ${Number(t.missing || 0) > 0 ? `<div>Липсват: <span style="font-weight:900;color:#991b1b">${Number(t.missing || 0)}</span></div>` : ``}
          </div>

          <a class="openBtn" href="/drivers/trips/${t.id}">Отвори списъка →</a>
        </div>
      `);
    }
  }

  (function(){
    let viewDate = new Date();
    viewDate.setDate(1);

    const today = ymd(new Date());
    window.__SELECTED_DATE__ = tripDateSet.has(today) ? today : "";

    renderCalendar(viewDate);
    renderTripsForDay(window.__SELECTED_DATE__ || "");

    document.getElementById("calPrev")?.addEventListener("click", () => {
      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);
      renderCalendar(viewDate);
    });

    document.getElementById("calNext")?.addEventListener("click", () => {
      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);
      renderCalendar(viewDate);
    });
  })();
</script>

{% endblock %}
