{% extends "base.html" %}
{% block content %}

<div style="max-width:1100px;margin:24px auto;">

  <!-- Header -->
  <div style="margin-bottom:22px;">
    <div style="font-size:28px;font-weight:900;color:#0f172a;">Admin панел</div>
    <div style="margin-top:6px;color:#64748b;font-size:14px;">
      Избери модул
    </div>
  </div>

  <!-- Containers -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">

    <!-- BOOKINGS -->
    <a href="/admin/bookings"
       style="text-decoration:none;color:inherit;">
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:22px;padding:20px;transition:.15s;cursor:pointer;"
           onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 30px rgba(0,0,0,.06)'"
           onmouseout="this.style.transform='none';this.style.boxShadow='none'">

        <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
          <div style="width:52px;height:52px;border-radius:16px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:26px;">
            📦
          </div>
          <div>
            <div style="font-size:20px;font-weight:900;color:#0f172a;">Bookings</div>
            <div style="font-size:13px;color:#64748b;margin-top:4px;">
              Dashboard • Списък • Детайл
            </div>
          </div>
        </div>

        <div style="font-size:13px;color:#475569;line-height:1.5;">
          Управление на резервации, плащания и seat allocation.
        </div>

      </div>
    </a>

    <!-- TRIPS -->
    <a href="/admin/trips"
       style="text-decoration:none;color:inherit;">
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:22px;padding:20px;transition:.15s;cursor:pointer;"
           onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 30px rgba(0,0,0,.06)'"
           onmouseout="this.style.transform='none';this.style.boxShadow='none'">

        <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
          <div style="width:52px;height:52px;border-radius:16px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:26px;">
            🚌
          </div>
          <div>
            <div style="font-size:20px;font-weight:900;color:#0f172a;">Trips</div>
            <div style="font-size:13px;color:#64748b;margin-top:4px;">
              Курсове • Пътници • QR check-in
            </div>
          </div>
        </div>

        <div style="font-size:13px;color:#475569;line-height:1.5;">
          Управление на рейсове, списъци и шофьорски изглед.
        </div>

      </div>
    </a>

  </div>

  <!-- Logout -->
  <div style="margin-top:26px;">
    <form method="post" action="/admin/logout">
      <button type="submit"
              style="border:1px solid #ef4444;background:#fff;color:#ef4444;border-radius:14px;padding:10px 14px;font-weight:800;cursor:pointer;">
        Изход
      </button>
    </form>
  </div>

</div>

<style>
@media (max-width: 860px){
  div[style*="grid-template-columns:1fr 1fr"]{
    grid-template-columns: 1fr !important;
  }
}
</style>

{% endblock %}
