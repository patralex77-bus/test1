{% extends "base.html" %}
{% block content %}

<div class="max-w-7xl mx-auto">
  <div class="flex items-center justify-between gap-4 mb-6">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">Bookings</h1>
      <p class="text-sm text-slate-500 mt-1">Dashboard, list and booking details</p>
    </div>

    <div class="flex items-center gap-2">
      <a href="/admin"
         class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
        ← Admin home
      </a>
       <a href="/admin/bookings/cancellations"
   class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
  Анулации
</a>
      <a href="/admin/bookings/test-import"
         class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
        Test import
      </a>
    </div>
  </div>

  <div class="mb-6">
    <div class="inline-flex rounded-2xl border border-slate-200 bg-white p-1 shadow-sm">
      <a href="/admin/bookings"
         class="rounded-xl px-4 py-2 text-sm font-medium {% if section == 'dashboard' %}bg-slate-900 text-white{% else %}text-slate-700 hover:bg-slate-50{% endif %}">
        Dashboard
      </a>

      <a href="/admin/bookings/list"
         class="rounded-xl px-4 py-2 text-sm font-medium {% if section == 'list' %}bg-slate-900 text-white{% else %}text-slate-700 hover:bg-slate-50{% endif %}">
        List
      </a>

      {% if section == 'detail' %}
      <span class="rounded-xl px-4 py-2 text-sm font-medium bg-slate-100 text-slate-700">
        Detail
      </span>
      {% endif %}
    </div>
  </div>

  {% block bookings_content %}{% endblock %}
</div>

{% endblock %}
